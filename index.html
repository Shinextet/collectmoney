<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ငွေစုမှတ်တမ်း</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .app-card { background: linear-gradient(145deg, #ffffff, #f0f0f0); }
    </style>
</head>
<body class="bg-blue-50 min-h-screen">
    <header class="bg-blue-600 text-white p-4 shadow-lg text-center font-bold text-lg sticky top-0 z-10">
        ငွေစုမှတ်တမ်း (Saving Tracker)
    </header>

    <div class="p-4 max-w-md mx-auto">
        <div class="app-card rounded-2xl shadow-xl p-6 border border-white">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600">ပန်းတိုင် (ကျပ်)</label>
                    <input type="number" id="goal" class="w-full mt-1 p-3 border-2 rounded-xl focus:border-blue-500 outline-none" placeholder="၁,၆၀၀,၀၀၀">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600">နေ့စွဲ</label>
                    <input type="date" id="date" class="w-full mt-1 p-3 border-2 rounded-xl focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600">စုငွေ (ကျပ်)</label>
                    <input type="number" id="amount" class="w-full mt-1 p-3 border-2 rounded-xl focus:border-blue-500 outline-none" placeholder="၅,၀၀၀">
                </div>
                <button onclick="addEntry()" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-bold shadow-md">မှတ်တမ်းတင်မည်</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-blue-100 p-4 rounded-xl text-center">
                    <p class="text-xs text-blue-600 font-bold">စုစုပေါင်း</p>
                    <span id="totalDisplay" class="text-xl font-bold text-blue-800">၀</span>
                </div>
                <div class="bg-red-100 p-4 rounded-xl text-center">
                    <p class="text-xs text-red-600 font-bold">ကျန်ရှိ</p>
                    <span id="remainingDisplay" class="text-xl font-bold text-red-800">၀</span>
                </div>
            </div>
        </div>

        <div class="mt-6 bg-white rounded-2xl shadow-md p-4">
            <h2 class="font-bold text-gray-700 mb-4 border-b pb-2">မှတ်တမ်းများ</h2>
            <div class="max-h-60 overflow-y-auto">
                <table class="w-full text-sm">
                    <tbody id="history" class="divide-y"></tbody>
                </table>
            </div>
        </div>
        
        <button onclick="resetApp()" class="mt-6 w-full text-xs text-gray-400">အချက်အလက်အားလုံး ဖျက်မည်</button>
    </div>

    <script>
        let savings = JSON.parse(localStorage.getItem('savings')) || [];
        let goal = localStorage.getItem('goal') || 0;

        const goalInput = document.getElementById('goal');
        const historyTable = document.getElementById('history');

        if (goal > 0) {
            goalInput.value = goal;
            goalInput.disabled = true;
        }
        document.getElementById('date').valueAsDate = new Date();
        updateUI();

        function addEntry() {
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            
            if (!goal && goalInput.value > 0) {
                goal = goalInput.value;
                localStorage.setItem('goal', goal);
                goalInput.disabled = true;
            }

            if (amount > 0 && date && goal > 0) {
                savings.push({ date, amount });
                localStorage.setItem('savings', JSON.stringify(savings));
                document.getElementById('amount').value = '';
                updateUI();
            } else {
                alert('ပန်းတိုင်နှင့် စုငွေပမာဏကို စစ်ဆေးပေးပါ။');
            }
        }

        function updateUI() {
            let total = savings.reduce((sum, item) => sum + item.amount, 0);
            document.getElementById('totalDisplay').innerText = total.toLocaleString();
            document.getElementById('remainingDisplay').innerText = Math.max(0, goal - total).toLocaleString();
            
            historyTable.innerHTML = savings.slice().reverse().map(item => `
                <tr>
                    <td class="py-3 text-gray-500">${item.date}</td>
                    <td class="text-right py-3 font-semibold text-gray-800">${item.amount.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function resetApp() {
            if (confirm('အချက်အလက်အားလုံးကို ဖျက်လိုက်မှာသေချာပါသလား?')) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
