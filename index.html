<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ငွေစုမှတ်တမ်း Pro</title>
    <!-- Tailwind CSS (Offline Mode) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; }
        .card { background-color: #1e1e1e; }
        input { background-color: #2a2a2a !important; color: white !important; border: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-sm mx-auto mt-4">
        <h1 class="text-xl font-bold text-center mb-6">ငွေစုမှတ်တမ်း</h1>

        <!-- Goal Card -->
        <div class="card rounded-2xl p-6 mb-6">
            <label class="text-xs text-gray-400 uppercase">ပန်းတိုင်ငွေပမာဏ</label>
            <input type="number" id="goal" class="w-full text-3xl font-bold mt-2 p-2 rounded-lg" placeholder="1,600,000">
        </div>

        <!-- Inputs -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <input type="date" id="date" class="p-4 rounded-2xl text-center">
            <input type="number" id="amount" class="p-4 rounded-2xl text-center" placeholder="စုငွေ">
            <button onclick="addEntry()" class="col-span-2 bg-blue-600 py-4 rounded-2xl font-bold active:bg-blue-700">မှတ်တမ်းတင်မည်</button>
        </div>

        <!-- Dashboard -->
        <div class="flex gap-4 mb-6">
            <div class="flex-1 bg-blue-600 p-5 rounded-3xl">
                <p class="text-blue-200 text-xs">စုစုပေါင်း</p>
                <h2 id="totalDisplay" class="text-2xl font-bold">0</h2>
            </div>
            <div class="flex-1 card p-5 rounded-3xl">
                <p class="text-gray-400 text-xs">ကျန်ရှိ</p>
                <h2 id="remainingDisplay" class="text-2xl font-bold">0</h2>
            </div>
        </div>

        <!-- History -->
        <div class="card rounded-3xl p-6">
            <h3 class="font-bold mb-4">လတ်တလော မှတ်တမ်း</h3>
            <div id="history" class="space-y-4 max-h-60 overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <script>
        let savings = JSON.parse(localStorage.getItem('savings')) || [];
        let goal = localStorage.getItem('goal') || 0;

        const goalInput = document.getElementById('goal');
        const historyContainer = document.getElementById('history');

        if (goal > 0) {
            goalInput.value = goal;
            goalInput.disabled = true;
        }
        document.getElementById('date').valueAsDate = new Date();
        updateUI();

        function addEntry() {
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            
            if (!goal && goalInput.value > 0) {
                goal = goalInput.value;
                localStorage.setItem('goal', goal);
                goalInput.disabled = true;
            }

            if (amount > 0 && date && goal > 0) {
                savings.push({ date, amount });
                localStorage.setItem('savings', JSON.stringify(savings));
                document.getElementById('amount').value = '';
                updateUI();
            } else {
                alert('ပန်းတိုင်နှင့် ငွေပမာဏကို စစ်ဆေးပေးပါ။');
            }
        }

        function updateUI() {
            let total = savings.reduce((sum, item) => sum + item.amount, 0);
            document.getElementById('totalDisplay').innerText = total.toLocaleString();
            document.getElementById('remainingDisplay').innerText = Math.max(0, goal - total).toLocaleString();
            
            historyContainer.innerHTML = savings.slice().reverse().map(item => `
                <div class="flex justify-between items-center border-b border-gray-700 pb-3">
                    <p class="text-sm text-gray-400">${item.date}</p>
                    <p class="font-bold">+ ${item.amount.toLocaleString()}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
